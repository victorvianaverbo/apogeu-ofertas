# Apogeu do Palestrante — ofertas (Bruno Bettini)
# Site estático: diagnóstico (quiz), desvendando (low ticket), encontro (evento)
# Sem build. Publica a raiz do repo.

[build]
  publish = "."

# Portas locais fixas para não conflitar com outros netlify dev na máquina
# (o servidor estático interno usa 3999 por padrão)
[dev]
  port = 8890
  staticServerPort = 4100
  functionsPort = 4001

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Raiz serve a HOME (ecossistema Apogeu), sem redirect.
[[redirects]]
  from = "/"
  to = "/home/index.html"
  status = 200

# URLs limpas sem barra final também resolvem
[[redirects]]
  from = "/diagnostico"
  to = "/diagnostico/"
  status = 301
[[redirects]]
  from = "/desvendando"
  to = "/desvendando/"
  status = 301
[[redirects]]
  from = "/encontro"
  to = "/encontro/"
  status = 301
[[redirects]]
  from = "/bio"
  to = "/bio/"
  status = 301
[[redirects]]
  from = "/dominando-o-mercado-de-palestras"
  to = "/dominando-o-mercado-de-palestras/"
  status = 301
[[redirects]]
  from = "/anamnese"
  to = "/anamnese/"
  status = 301

# Ciclo de eventos presenciais — agosto/2026 (identidade Apogeu + cor do programa)
[[redirects]]
  from = "/eventos"
  to = "/eventos/"
  status = 301
[[redirects]]
  from = "/propulsao-em-vendas"
  to = "/propulsao-em-vendas/"
  status = 301
[[redirects]]
  from = "/lideranca"
  to = "/lideranca/"
  status = 301
[[redirects]]
  from = "/oratoria"
  to = "/oratoria/"
  status = 301
[[redirects]]
  from = "/inteligencia-emocional"
  to = "/inteligencia-emocional/"
  status = 301
[[redirects]]
  from = "/empreenday"
  to = "/empreenday/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Apogeu do Palestrante — ofertas (Bruno Bettini)
# Site estático: diagnóstico (quiz), desvendando (low ticket), encontro (evento)
# Sem build. Publica a raiz do repo.

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Raiz serve a HOME (ecossistema Apogeu), sem redirect.
[[redirects]]
  from = "/"
  to = "/home/index.html"
  status = 200

# URLs limpas sem barra final também resolvem
[[redirects]]
  from = "/diagnostico"
  to = "/diagnostico/"
  status = 301
[[redirects]]
  from = "/desvendando"
  to = "/desvendando/"
  status = 301
[[redirects]]
  from = "/encontro"
  to = "/encontro/"
  status = 301
[[redirects]]
  from = "/bio"
  to = "/bio/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
